name: pull_request

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .devcontainer/**
      - .vscode/**
      - docs/**
      - README.md
      - LICENSE
      - .giitignore
      - .github/workflows/**

jobs:
  
  pull_request:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group dev --frozen

      - name: Run tests
        run: |
          make test

      - name: Print snapshot date
        run: |
          echo "SNAPSHOT_DATE=$(make --no-print-directory print_snapshot_date)"

      - name: Run script
        run: |
          make run