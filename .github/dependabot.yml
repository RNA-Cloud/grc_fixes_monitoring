version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"

    # Reduce PR noise
    open-pull-requests-limit: 10

    commit-message:
      prefix: "chore"

    # Group related updates
    groups:
      dev-dependencies:
        dependency-type: "development"

      runtime-dependencies:
        dependency-type: "production"

    # Optional: keep version strategy conservative
    versioning-strategy: increase-if-necessary

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "chore"

    groups:
      github-actions:
        patterns:
          - "*"
